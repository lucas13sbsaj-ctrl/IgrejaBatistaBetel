      <feComposite in="specOut" in2="SourceGraphic" operator="in" result="specChar"/>
      <feComposite in="SourceGraphic" in2="specChar" operator="arithmetic" k1="0" k2="1" k3="0.6" k4="0"/>
    </filter>
  </defs>
