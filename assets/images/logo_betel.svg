<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="100%" height="100%">
  <defs>
    <linearGradient id="bronzeBase" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b89a5b" />
      <stop offset="25%" stop-color="#8a6f3e" />
      <stop offset="50%" stop-color="#dfca9e" />
      <stop offset="75%" stop-color="#69532d" />
      <stop offset="100%" stop-color="#a38526" />
    </linearGradient>
    <linearGradient id="bronzeHighlight" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#544324" stop-opacity="0.8"/>
