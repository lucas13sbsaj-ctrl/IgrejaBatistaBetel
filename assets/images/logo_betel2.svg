<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="100%" height="100%">
  <defs>
    <!-- Sombra suave para dar profundidade e manter o destaque do branco sobre o fundo claro -->
    <filter id="sombraSuave" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Grupo com todos os elementos totalmente brancos e sem contornos -->
  <g filter="url(#sombraSuave)" fill="#ffffff" stroke="none">
    
    <!-- 1. OS DOIS 'B's AO FUNDO -->
    <!-- B de trás -->
    <path d="M 88 52 C 112 52, 126 62, 126 76 C 126 88, 114 94, 98 95 C 118 96, 128 104, 128 120 C 128 136, 110 144, 84 144 L 84 135 C 104 135, 118 129, 118 120 C 118 110, 106 104, 88 104 L 84 104 L 84 95 L 88 95 C 104 95, 116 88, 116 76 C 116 66, 104 60, 88 60 Z" />
          
    <!-- B da frente -->
    <path d="M 72 38 C 96 38, 110 48, 110 62 C 110 74, 98 80, 82 81 C 102 82, 112 90, 112 106 C 112 122, 94 130, 68 130 L 68 121 C 88 121, 102 115, 102 106 C 102 96, 90 90, 72 90 L 68 90 L 68 81 L 72 81 C 88 81, 100 74, 100 62 C 100 52, 88 46, 72 46 Z" />

    <!-- 2. A CRUZ CENTRALIZADA (Com um sutil recorte para separar visualmente as camadas) -->
    <path d="M 46 44 L 56 44 L 56 68 L 80 68 L 80 78 L 56 78 L 56 148 L 46 148 L 46 78 L 22 78 L 22 68 L 46 68 Z" />

    <!-- 3. A CHAMA NO TOPO -->
    <path d="M 51 10 C 47 22, 42 27, 49 34 C 53 38, 55 41, 51 44 C 57 41, 58 35, 54 30 C 50 26, 54 18, 51 10 Z" />
  </g>
</svg>
